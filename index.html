                        '---',
                        `title: "${escapeYaml(note.title)}"`,
                        `uniqueId: "${note.id}"`,
                        `tags: [${note.tags.map(tag => `"${escapeYaml(tag.name)}"`).join(', ')}]`,
                        `created: "${new Date(note.createdAt).toISOString()}"`,
                        `modified: "${new Date(note.editedAt).toISOString()}"`,
                        '---',
                        ''
                    ].join('\n');

                    const markdown = frontmatter + note.content;
                    const filename = sanitizeFilename(note.title) + '_' + note.id + '.md';

                    return {
                        filename: filename,
                        content: markdown,
                        note: note
                    };
                });

                // Helper function to sync a single file with retry logic for SHA conflicts
                async function syncFileWithRetry(noteFile, apiBase, headers, maxRetries = 2) {
                    for (let attempt = 0; attempt <= maxRetries; attempt++) {
                        try {
                            console.log(`Syncing file: ${noteFile.filename} (attempt ${attempt + 1})`);

                            // URL encode the filename to handle any special characters
                            const encodedFilename = encodeURIComponent(noteFile.filename);

                            // Fetch current file info for SHA (fresh each attempt)
                            let currentSHA = null;
                            try {
                                const fileInfoResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                                    method: 'GET',
                                    headers: headers
                                });

                                if (fileInfoResponse.ok) {
                                    const fileInfo = await fileInfoResponse.json();
                                    currentSHA = fileInfo.sha;
                                    console.log(`Got current SHA for ${noteFile.filename}: ${currentSHA}`);
                                }
                            } catch (shaError) {
                                console.log(`File ${noteFile.filename} doesn't exist remotely, creating new file`);
                            }

                            const requestBody = {
                                message: `Update note: ${noteFile.note.title}`,
                                content: btoa(unescape(encodeURIComponent(noteFile.content))) // Base64 encode
                            };

                            // Add SHA if updating existing file
                            if (currentSHA) {
                                requestBody.sha = currentSHA;
                            }

                            const fileResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                                method: 'PUT',
                                headers: headers,
                                body: JSON.stringify(requestBody)
                            });

                            if (fileResponse.ok) {
                                console.log(`Successfully synced: ${noteFile.filename}`);
                                return true;
                            } else {
                                const errorText = await fileResponse.text();

                                // Check if it's a SHA conflict (409 status or hash mismatch error)
                                if (fileResponse.status === 409 || errorText.includes('sha') || errorText.includes('hash')) {
                                    console.log(`SHA conflict detected for ${noteFile.filename}, will retry...`);
                                    if (attempt === maxRetries) {
                                        console.error(`Failed to sync ${noteFile.filename} after ${maxRetries + 1} attempts: ${errorText}`);
                                        return false;
                                    }
                                    // Wait a bit before retrying to allow for any ongoing changes to settle
                                    await new Promise(resolve => setTimeout(resolve, 1000));
                                    continue;
                                } else {
                                    console.error(`Failed to sync ${noteFile.filename}:`, errorText);
                                    return false;
                                }
                            }
                        } catch (error) {
                            console.error(`Error syncing file ${noteFile.filename} on attempt ${attempt + 1}:`, error);
                            if (attempt === maxRetries) {
                                return false;
                            }
                            // Wait before retrying
                            await new Promise(resolve => setTimeout(resolve, 1000));
                        }
                    }
                    return false;
                }

                // Push files to repository
                let syncedCount = 0;
                const filesToDelete = []; // Initialize array for files to delete (for conflict resolution)

                for (const noteFile of noteFiles) {
                    const success = await syncFileWithRetry(noteFile, apiBase, headers);
                    if (success) {
                        syncedCount++;
                    }

                    // Add a small delay between requests to avoid rate limiting
                    await new Promise(resolve => setTimeout(resolve, 200));
                }

                // Step 6: Delete conflict resolution files
                if (filesToDelete.length > 0) {
                    console.log(`Deleting ${filesToDelete.length} conflict resolution files...`);
                    let deletedCount = 0;

                    for (const filename of filesToDelete) {
                        try {
                            console.log("Fetching file " + filename);
                            // URL encode the filename to handle any special characters
                            const encodedFilename = encodeURIComponent(filename);

                            // Get the current SHA of the file to delete
                            const fileInfoResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                                method: 'GET',
                                headers: headers
                            });

                            if (fileInfoResponse.ok) {
                                const fileInfo = await fileInfoResponse.json();
                                const currentSHA = fileInfo.sha;

                                // Delete the file
                                const deleteResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                                    method: 'DELETE',
                                    headers: headers,
                                    body: JSON.stringify({
                                        message: `Delete conflicted file: ${filename}`,
                                        sha: currentSHA
                                    })
                                });

                                if (deleteResponse.ok) {
                                    console.log(`Successfully deleted conflict file: ${filename}`);
                                    deletedCount++;
                                } else {
                                    console.error(`Failed to delete ${filename}: ${deleteResponse.status} ${deleteResponse.statusText}`);
                                }
                            } else {
                                console.log(`File ${filename} no longer exists, skipping deletion`);
                            }

                            // Add delay to avoid rate limiting
                            await new Promise(resolve => setTimeout(resolve, 200));
                        } catch (error) {
                            console.error(`Error deleting file ${filename}:`, error);
                        }
                    }

                    console.log(`Deleted ${deletedCount} of ${filesToDelete.length} conflict files`);
                }

                return `Successfully synced ${syncedCount} of ${noteFiles.length} notes. Added ${addedFromRemote} notes from repository. Updated ${updatedFromRemote} existing notes from repository.${filesToDelete.length > 0 ? ` Cleaned up ${filesToDelete.length} conflict files.` : ''}`;

            } catch (error) {
                console.error('GitHub sync error:', error);
                throw new Error('GitHub sync failed: ' + error.message);
            }
        }

        // Helper function to escape YAML strings
        function escapeYaml(str) {
            return str.replace(/"/g, '\\"').replace(/\n/g, '\\n');
        }

        // Function to parse markdown frontmatter and extract note data
        function parseMarkdownNote(content, filename) {
            try {
                const lines = content.split('\n');
                if (lines[0] !== '---') {
                    return null; // No frontmatter
                }

                let frontmatterEnd = -1;
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i] === '---') {
                        frontmatterEnd = i;
                        break;
                    }
                }

                if (frontmatterEnd === -1) {
                    return null; // Malformed frontmatter
                }

                // Parse frontmatter
                const frontmatterLines = lines.slice(1, frontmatterEnd);
                const metadata = {};

                for (const line of frontmatterLines) {
                    const colonIndex = line.indexOf(':');
                    if (colonIndex > 0) {
                        const key = line.substring(0, colonIndex).trim();
                        const value = line.substring(colonIndex + 1).trim().replace(/^"(.*)"$/, '$1');
                        metadata[key] = value;
                    }
                }

                // Extract content after frontmatter
                const noteContent = lines.slice(frontmatterEnd + 1).join('\n').trim();

                // Parse tags if they exist
                let tags = [];
                if (metadata.tags) {
                    // Remove brackets and split by comma
                    const tagString = metadata.tags.replace(/[\[\]]/g, '');
                    if (tagString.trim()) {
                        tags = tagString.split(',').map(tag => ({
                            name: tag.trim().replace(/^"(.*)"$/, '$1')
                        }));
                    }
                }

                return {
                    id: parseInt(metadata.uniqueId) || Date.now(),
                    title: metadata.title || 'Untitled',
                    content: noteContent,
                    createdAt: metadata.created ? new Date(metadata.created).getTime() : Date.now(),
                    editedAt: metadata.modified ? new Date(metadata.modified).getTime() : (metadata.created ? new Date(metadata.created).getTime() : Date.now()),
                    tags: tags
                };

            } catch (error) {
                console.error('Error parsing markdown note:', error);
                return null;
            }
        }

        // Function to pull notes from GitHub repository
        async function pullNotesFromGitHub(config) {
            try {
                const url = new URL(config.repositoryUrl);
                const pathParts = url.pathname.split('/').filter(part => part.length > 0);

                if (pathParts.length < 2) {
                    throw new Error('Invalid repository URL format');
                }

                const owner = pathParts[0];
                const repo = pathParts[1];
                const apiBase = `https://api.github.com/repos/${owner}/${repo}`;

                const headers = {
                    'Authorization': getAuthorizationHeader(config.personalAccessToken),
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28'
                };

                console.log(`Attempting to fetch contents from: ${apiBase}/contents`);

                // First, check if the repository exists by fetching repo info
                try {
                    const repoResponse = await fetch(apiBase, {
                        method: 'GET',
                        headers: headers
                    });

                    if (!repoResponse.ok) {
                        if (repoResponse.status === 404) {
                            throw new Error(`Repository '${owner}/${repo}' not found. Please check the repository URL.`);
                        } else if (repoResponse.status === 403) {
                            throw new Error(`Access denied to repository '${owner}/${repo}'. Please check your token permissions.`);
                        }
                        throw new Error(`Failed to access repository: ${repoResponse.status}`);
                    }
                    console.log(`Repository ${owner}/${repo} exists and is accessible`);
                } catch (repoError) {
                    throw new Error(`Repository access failed: ${repoError.message}`);
                }

                // Fetch repository contents
                const contentsResponse = await fetch(`${apiBase}/contents`, {
                    method: 'GET',
                    headers: headers
                });

                if (!contentsResponse.ok) {
                    if (contentsResponse.status === 403) {
                        throw new Error(`Access denied. Please ensure your token has 'Contents' repository permissions.`);
                    } else if (contentsResponse.status === 404) {
                        // Repository exists but is empty or path doesn't exist - this is okay for first sync
                        console.log('Repository appears to be empty - treating as no existing notes');
                        return [];
                    }
                    throw new Error(`Failed to fetch repository contents: ${contentsResponse.status}`);
                }

                const files = await contentsResponse.json();
                const markdownFiles = files.filter(file => file.name.endsWith('.md') && file.type === 'file');

                console.log(`Found ${markdownFiles.length} markdown files in repository`);

                // Fetch content of each markdown file
                const remoteNotes = [];
                for (const file of markdownFiles) {
                    try {
                        // URL encode the file path to handle any special characters
                        const encodedFilePath = encodeURIComponent(file.path);

                        // For private repositories, we need to use the API endpoint with authentication
                        // instead of the raw download_url which may not work for private repos
                        const fileContentResponse = await fetch(`${apiBase}/contents/${encodedFilePath}`, {
                            method: 'GET',
                            headers: headers
                        });

                        if (fileContentResponse.ok) {
                            const fileData = await fileContentResponse.json();
                            // GitHub API returns base64 encoded content
                            try {
                                const content = atob(fileData.content.replace(/\s/g, ''));
                                const note = parseMarkdownNote(content, file.name);
                                if (note) {
                                    remoteNotes.push(note);
                                }
                            } catch (decodeError) {
                                console.error(`Failed to decode content for ${file.name}:`, decodeError);
                            }
                        } else {
                            console.error(`Failed to fetch content for ${file.name}: ${fileContentResponse.status}`);
                        }
                    } catch (error) {
                        console.error(`Error fetching file ${file.name}:`, error);
                    }
                }

                return remoteNotes;

            } catch (error) {
                console.error('Error pulling notes from GitHub:', error);
                throw error;
            }
        }

        // Function to perform force pull - delete all local notes and recreate from remote repository
        async function performForcePullFromGitHub(config) {
            try {
                console.log('Starting force pull from GitHub repository:', config.repositoryUrl);

                // Security check: Verify we're working with a decrypted token for sync
                if (config.personalAccessToken && isTokenEncrypted(config.personalAccessToken)) {
                    throw new Error('Cannot sync with encrypted token - token must be decrypted for API calls');
                }

                // Reminder: This token is temporarily decrypted ONLY for this operation
                console.log('🔒 Using temporarily decrypted token for force pull (will not be saved)');

                // Step 1: Pull all notes from GitHub
                console.log('Pulling notes from GitHub...');
                let remoteNotes = [];
                try {
                    remoteNotes = await pullNotesFromGitHub(config);
                    console.log(`Successfully pulled ${remoteNotes.length} notes from GitHub`);
                } catch (error) {
                    console.log('No existing notes found in repository or error pulling:', error.message);
                    // For empty repositories, we'll just clear local notes
                    remoteNotes = [];
                }

                // Step 2: Clear all local notes (delete everything)
                console.log('Clearing all local notes...');
                try {
                    await saveNotesToDB([], true);  // Mark as sync operation
                    console.log('Local notes cleared successfully');
                } catch (error) {
                    console.error('Failed to clear local notes:', error);
                    throw new Error('Force pull failed: Unable to clear local notes - ' + error.message);
                }

                // Step 3: Save the remote notes as local notes (recreate everything from remote)
                if (remoteNotes.length > 0) {
                    console.log(`Saving ${remoteNotes.length} notes from remote repository...`);
                    try {
                        await saveNotesToDB(remoteNotes, true);  // Mark as sync operation
                        console.log('Successfully recreated all notes from remote repository');
                    } catch (error) {
                        console.error('Failed to save remote notes:', error);
                        throw new Error('Force pull failed: Unable to save remote notes - ' + error.message);
                    }
                } else {
                    console.log('No notes found in remote repository - local storage is now empty');
                }

                // Step 4: Clear all action events since we've just done a complete reset
                console.log('Clearing action events after force pull...');
                localStorage.removeItem('notez-action-events');
                localStorage.removeItem('notez-action-count');

                // Step 5: Get the current remote HEAD to return as the sync reference
                let finalRemoteRef = null;
                try {
                    console.log('🔄 Getting current remote HEAD after force pull...');
                    finalRemoteRef = await getLatestCommitSha(config.repositoryUrl, config.personalAccessToken, 'main', true);
                    console.log(`✅ Current remote HEAD: ${finalRemoteRef}`);
                } catch (error) {
                    console.warn('⚠️  Could not get current remote HEAD after force pull:', error.message);
                    // For force pull, we don't have a fallback since we didn't make any commits
                    finalRemoteRef = null;
                }

                // Return success message
                const message = remoteNotes.length > 0
                    ? `Force pull completed: Deleted all local notes and recreated ${remoteNotes.length} notes from repository`
                    : 'Force pull completed: Deleted all local notes (remote repository is empty)';

                return {
                    message: message,
                    commitSha: finalRemoteRef, // Return the current remote HEAD as the sync reference
                    updatedNotes: remoteNotes // Return the notes so caller can notify about updates
                };

            } catch (error) {
                console.error('Force pull from GitHub failed:', error);
                throw new Error('Force pull failed: ' + error.message);
            }
        }

        // New function to perform GitHub sync with incremental updates based on action events
        async function performGitHubSyncWithEvents(syncData) {
            try {
                const config = syncData.config;
                const actionEvents = syncData.actionEvents || [];

                console.log('Starting incremental GitHub sync with repository:', config.repositoryUrl);
                console.log(`Found ${actionEvents.length} action events to process`);
                console.log('Action events received:', actionEvents);

                // Security check: Verify we're working with a decrypted token for sync
                if (config.personalAccessToken && isTokenEncrypted(config.personalAccessToken)) {
                    throw new Error('Cannot sync with encrypted token - token must be decrypted for API calls');
                }

                // Reminder: This token is temporarily decrypted ONLY for this sync operation
                // It should NEVER be saved back to storage in this state
                console.log('🔒 Using temporarily decrypted token for sync (will not be saved)');

                // Extract owner and repo from URL
                const url = new URL(config.repositoryUrl);
                const pathParts = url.pathname.split('/').filter(part => part.length > 0);

                if (pathParts.length < 2) {
                    throw new Error('Invalid repository URL format');
                }

                const owner = pathParts[0];
                const repo = pathParts[1];
                const apiBase = `https://api.github.com/repos/${owner}/${repo}`;

                // Headers for GitHub API
                const headers = {
                    'Authorization': getAuthorizationHeader(config.personalAccessToken),
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                };

                // Track updated notes for editor refresh notifications
                const updatedNoteIds = [];                // Step 1: Always get the current remote HEAD first for proper comparison
                let currentRemoteRef = null;
                let hasRemoteChanges = false;

                try {
                    console.log('🔍 Fetching current remote HEAD for comparison...');
                    currentRemoteRef = await getLatestCommitSha(config.repositoryUrl, config.personalAccessToken, 'main', true);
                    console.log(`📍 Current remote HEAD: ${currentRemoteRef}`);

                    // Compare with lastSyncRef to determine if there are remote changes
                    if (config.lastSyncRef && config.lastSyncRef !== currentRemoteRef) {
                        console.log(`🔄 Remote changes detected: ${config.lastSyncRef} -> ${currentRemoteRef}`);
                        hasRemoteChanges = true;
                    } else if (!config.lastSyncRef) {
                        console.log('📝 No previous sync reference, treating as initial sync');
                        hasRemoteChanges = true; // First sync
                    } else {
                        console.log('✅ No remote changes detected');
                        hasRemoteChanges = false;
                    }
                } catch (error) {
                    console.warn('⚠️  Could not check remote changes:', error.message);
                    hasRemoteChanges = true; // Assume changes if we can't check
                }

                // Step 2: Check for incremental remote changes (if any)
                console.log('🚀 Checking for incremental changes from remote...');
                let incrementalChanges = { changedNotes: [], deletedFiles: [], hasChanges: false };

                if (hasRemoteChanges) {
                    try {
                        // Use incremental sync to get only the remote changes
                        incrementalChanges = await fetchChangedNotesSinceLastSync(config);
                        console.log(`✅ Incremental sync result: ${incrementalChanges.changedNotes.length} changed notes, ${incrementalChanges.deletedFiles.length} deleted files`);
                    } catch (error) {
                        console.error('❌ Incremental sync failed:', error.message);
                        // Fall back to empty changes rather than failing completely
                        incrementalChanges = { changedNotes: [], deletedFiles: [], hasChanges: false };
                        hasRemoteChanges = false;
                        console.warn('⚠️  Continuing sync without remote changes due to incremental sync failure');
                    }
                } else {
                    console.log('✅ No remote changes, proceeding with local sync only');
                }

                // Step 3: Apply incremental changes to local notes if any changes were found
                if (incrementalChanges.hasChanges) {
                    console.log('📥 Applying incremental changes to local notes...');
                    const localNotes = await loadNotesFromDB();
                    const mergedNotes = [...localNotes];
                    let addedFromRemote = 0;
                    let updatedFromRemote = 0;

                    // Process changed/added notes from upstream
                    for (const remoteNote of incrementalChanges.changedNotes) {
                        const localNoteIndex = mergedNotes.findIndex(local => local.id === remoteNote.id);

                        if (localNoteIndex === -1) {
                            // Note doesn't exist locally, add it
                            mergedNotes.push({ ...remoteNote });
                            addedFromRemote++;
                            updatedNoteIds.push(remoteNote.id); // Track this note as added
                            console.log(`➕ Added new note from upstream: ${remoteNote.title}`);
                        } else {
                            // Note exists locally, check if remote version is newer
                            const localNote = mergedNotes[localNoteIndex];
                            
                            // Ensure proper timestamp comparison by converting to numbers
                            const remoteTimestamp = Number(remoteNote.editedAt);
                            const localTimestamp = Number(localNote.editedAt);
                            
                            if (remoteTimestamp > localTimestamp) {
                                mergedNotes[localNoteIndex] = { ...remoteNote };
                                updatedFromRemote++;
                                updatedNoteIds.push(remoteNote.id); // Track this note as updated
                                console.log(`🔄 Updated note from upstream: ${remoteNote.title} (remote: ${remoteTimestamp} > local: ${localTimestamp})`);
                            } else {
                                console.log(`⏭️  Skipped older remote version: ${remoteNote.title} (remote: ${remoteTimestamp} <= local: ${localTimestamp})`);
                            }
                        }
                    }

                    // Process deleted files from upstream
                    let deletedCount = 0;
                    for (const deletedFile of incrementalChanges.deletedFiles) {
                        const match = deletedFile.match(/_(\d+)\.md$/);
                        if (match) {
                            const noteId = parseInt(match[1]);
                            const noteIndex = mergedNotes.findIndex(note => note.id === noteId);
                            if (noteIndex !== -1) {
                                console.log(`🗑️  Removing note deleted from upstream: ${mergedNotes[noteIndex].title}`);
                                mergedNotes.splice(noteIndex, 1);
                                deletedCount++;
                            }
                        }
                    }

                    console.log(`✅ Applied incremental changes: ${addedFromRemote} added, ${updatedFromRemote} updated, ${deletedCount} deleted`);
                    // Save merged notes if there were any changes
                    if (addedFromRemote > 0 || updatedFromRemote > 0 || deletedCount > 0) {
                        console.log('💾 Saving merged notes to local database...');
                        await saveNotesToDB(mergedNotes, true);  // Mark as sync operation
                        console.log('✅ Successfully updated local notes with incremental changes');
                    }
                } else {
                    console.log('✅ No incremental changes to apply - repository is up to date');
                }

                // Step 4: Load current local notes for action event processing
                const currentNotes = await loadNotesFromDB();
                console.log(`Found ${currentNotes.length} local notes for action event processing`);

                // Step 5: Process all action events from the list
                console.log(`Processing ${actionEvents.length} action events from the list`);

                // Log the events for debugging
                if (actionEvents.length > 0) {
                    console.log('Action events to process:', actionEvents.map(event => ({
                        type: event.actionType,
                        noteId: event.noteId,
                        title: event.noteTitle,
                        timestamp: new Date(event.timestamp).toISOString()
                    })));
                }

                // Step 6: Process action events into filesystem operations
                const operations = await translateEventsToFileOperations(actionEvents, currentNotes);
                console.log(`Generated ${operations.length} filesystem operations from action events`);

                // Log the operations for debugging
                if (operations.length > 0) {
                    console.log('Filesystem operations to execute:', operations.map(op => ({
                        type: op.type,
                        filename: op.filename,
                        message: op.message
                    })));
                }

                // Step 7: Execute filesystem operations on GitHub
                let successCount = 0;
                let latestCommitSha = null; // Track the latest commit SHA from our operations
                for (const operation of operations) {
                    try {
                        console.log(`Executing ${operation.type} operation: ${operation.filename}`);
                        const result = await executeGitHubOperation(operation, apiBase, headers);
                        if (result.success) {
                            successCount++;
                            console.log(`✓ Operation ${operation.type} completed successfully for ${operation.filename}`);
                            // Update the latest commit SHA if one was returned
                            if (result.commitSha) {
                                latestCommitSha = result.commitSha;
                            }
                        } else {
                            console.error(`✗ Operation ${operation.type} failed for ${operation.filename}`);
                        }

                        // Add delay between operations to avoid rate limiting
                        if (operations.length > 1) {
                            await new Promise(resolve => setTimeout(resolve, 300));
                        }
                    } catch (error) {
                        console.error(`Failed to execute operation ${operation.type} for ${operation.filename}:`, error);
                    }
                }

                console.log(`Successfully executed ${successCount}/${operations.length} filesystem operations`);

                // Step 8: CRITICAL - Set lastSyncRef according to what we actually did
                // When we push local changes, use the last ref we pushed ourselves
                // When we only pull remote changes, use the head ref we are pulling from
                let finalRemoteRef = null;

                if (successCount > 0) {
                    // We pushed local changes - use the last commit SHA we pushed ourselves
                    if (latestCommitSha) {
                        finalRemoteRef = latestCommitSha;
                        console.log(`✅ Using last pushed commit SHA as final sync reference: ${finalRemoteRef}`);
                    } else {
                        console.warn("⚠️  No commit SHA available from push operations");
                        // Fallback to current remote ref
                        finalRemoteRef = currentRemoteRef;
                    }
                } else {
                    // We only pulled remote changes (or no changes at all)
                    // Use the remote HEAD ref we pulled from
                    finalRemoteRef = currentRemoteRef;
                    console.log(`✅ Using remote HEAD ref as final sync reference: ${finalRemoteRef}`);
                }

                // Step 9: Skip full sync - we already handled remote changes with incremental sync
                // The incremental sync in Step 2 already pulled any upstream changes efficiently
                console.log('✅ Sync complete - incremental sync already handled all remote changes, no full sync needed');

                // Prepare result message
                let resultMessage = `Sync completed: ${successCount}/${operations.length} local operations executed successfully`;

                // Add information about remote changes if any were processed
                if (hasRemoteChanges) {
                    resultMessage += `. Remote changes were pulled and applied to local notes`;
                } else {
                    resultMessage += `. No remote changes detected`;
                }

                // Return both the message and the final remote ref to save as lastSyncRef
                return {
                    message: resultMessage,
                    latestCommitSha: finalRemoteRef, // This is the ref we should save for the next sync
                    updatedNoteIds: updatedNoteIds // Return the list of note IDs that were updated during sync
                };

            } catch (error) {
                console.error('GitHub sync with events failed:', error);
                throw error;
            }
        }

        // Helper function to merge local notes with remote notes
        async function mergeNotesWithRemote(localNotes, remoteNotes) {
            const mergedNotes = [...localNotes];
            let hasChanges = false;
            let addedFromRemote = 0;
            let updatedFromRemote = 0;
            const updatedNoteIds = []; // Track which notes were updated for editor refresh

            for (const remoteNote of remoteNotes) {
                const localNoteIndex = mergedNotes.findIndex(local => local.id === remoteNote.id);

                if (localNoteIndex === -1) {
                    // Note doesn't exist locally, add it
                    mergedNotes.push({ ...remoteNote });
                    addedFromRemote++;
                    hasChanges = true;
                } else {
                    // Note exists locally, check if remote version is newer
                    const localNote = mergedNotes[localNoteIndex];

                    // Ensure proper timestamp comparison by converting to numbers
                    const remoteTimestamp = Number(remoteNote.editedAt);
                    const localTimestamp = Number(localNote.editedAt);

                    if (remoteTimestamp > localTimestamp) {
                        // Remote version is newer, update local note
                        console.log(`Updating local note "${localNote.title}" with newer remote version (remote: ${remoteTimestamp} > local: ${localTimestamp})`);
                        mergedNotes[localNoteIndex] = { ...remoteNote };
                        updatedFromRemote++;
                        updatedNoteIds.push(remoteNote.id); // Track this note as updated
                        hasChanges = true;
                    } else {
                        console.log(`Keeping local note "${localNote.title}" (remote: ${remoteTimestamp} <= local: ${localTimestamp})`);
                    }
                }
            }

            console.log(`Merge results: ${addedFromRemote} added, ${updatedFromRemote} updated from remote`);
            return { notes: mergedNotes, hasChanges, updatedNoteIds };
        }

        // Helper function to translate action events into filesystem operations
        async function translateEventsToFileOperations(actionEvents, currentNotes) {
            const operations = [];
            const processedNotes = new Set(); // Track notes we've already processed

            for (const event of actionEvents) {
                // Skip if we've already processed this note in a later event
                if (processedNotes.has(event.noteId)) {
                    continue;
                }

                const note = currentNotes.find(n => n.id === event.noteId);

                switch (event.actionType) {
                    case 'added':
                        if (note) {
                            operations.push({
                                type: 'create',
                                filename: sanitizeFilename(note.title) + '_' + note.id + '.md',
                                note: note,
                                message: `Add note: ${note.title}`
                            });
                        }
                        break;

                    case 'updated':
                        if (note) {
                            operations.push({
                                type: 'update',
                                filename: sanitizeFilename(note.title) + '_' + note.id + '.md',
                                note: note,
                                message: `Update note: ${note.title}`
                            });
                        }
                        break;

                    case 'deleted':
                        // For deleted notes, we need to find the filename from the event title
                        const deletedFilename = sanitizeFilename(event.noteTitle) + '_' + event.noteId + '.md';
                        operations.push({
                            type: 'delete',
                            filename: deletedFilename,
                            message: `Delete note: ${event.noteTitle}`
                        });
                        break;

                    case 'renamed':
                        if (note) {
                            // For renames, use the stored old filename if available
                            let oldFilename;
                            if (event.oldFilename) {
                                // Use the stored old filename from the action event
                                oldFilename = event.oldFilename;
                            } else {
                                // Fallback: use the event title as the old title (for backwards compatibility)
                                oldFilename = sanitizeFilename(event.noteTitle) + '_' + event.noteId + '.md';
                            }

                            const newFilename = sanitizeFilename(note.title) + '_' + note.id + '.md';

                            if (oldFilename !== newFilename) {
                                operations.push({
                                    type: 'delete',
                                    filename: oldFilename,
                                    message: `Rename: delete old file ${oldFilename}`
                                });
                                operations.push({
                                    type: 'create',
                                    filename: newFilename,
                                    note: note,
                                    message: `Rename: create new file ${note.title}`
                                });
                            }
                        }
                        break;
                }

                processedNotes.add(event.noteId);
            }

            return operations;
        }

        // Helper function to execute a single GitHub operation
        async function executeGitHubOperation(operation, apiBase, headers) {
            try {
                const encodedFilename = encodeURIComponent(operation.filename);

                if (operation.type === 'delete') {
                    // Get file SHA first
                    try {
                        const fileInfoResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                            method: 'GET',
                            headers: headers
                        });

                        if (fileInfoResponse.ok) {
                            const fileInfo = await fileInfoResponse.json();

                            // Delete the file
                            const deleteResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                                method: 'DELETE',
                                headers: headers,
                                body: JSON.stringify({
                                    message: operation.message,
                                    sha: fileInfo.sha
                                })
                            });

                            if (deleteResponse.ok) {
                                console.log(`Successfully deleted: ${operation.filename}`);
                                const responseData = await deleteResponse.json();
                                return { success: true, commitSha: responseData.commit?.sha };
                            } else {
                                console.error(`Failed to delete ${operation.filename}: ${deleteResponse.status}`);
                                return { success: false };
                            }
                        } else {
                            console.log(`File ${operation.filename} doesn't exist remotely, skipping delete`);
                            return { success: true }; // Consider this a success but no commit SHA
                        }
                    } catch (error) {
                        console.error(`Error deleting file ${operation.filename}:`, error);
                        return { success: false };
                    }

                } else if (operation.type === 'create' || operation.type === 'update') {
                    // Convert note to markdown
                    const frontmatter = [
                        '---',
                        `title: "${escapeYaml(operation.note.title)}"`,
                        `uniqueId: "${operation.note.id}"`,
                        `tags: [${operation.note.tags.map(tag => `"${escapeYaml(tag.name)}"`).join(', ')}]`,
                        `created: "${new Date(operation.note.createdAt).toISOString()}"`,
                        `modified: "${new Date(operation.note.editedAt).toISOString()}"`,
                        '---',
                        ''
                    ].join('\n');

                    const markdown = frontmatter + operation.note.content;

                    // Get current SHA if updating
                    let currentSHA = null;
                    if (operation.type === 'update') {
                        try {
                            const fileInfoResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                                method: 'GET',
                                headers: headers
                            });

                            if (fileInfoResponse.ok) {
                                const fileInfo = await fileInfoResponse.json();
                                currentSHA = fileInfo.sha;
                            }
                        } catch (shaError) {
                            console.log(`File ${operation.filename} doesn't exist remotely, creating new file`);
                        }
                    }

                    const requestBody = {
                        message: operation.message,
                        content: btoa(unescape(encodeURIComponent(markdown))) // Base64 encode
                    };

                    if (currentSHA) {
                        requestBody.sha = currentSHA;
                    }

                    const fileResponse = await fetch(`${apiBase}/contents/${encodedFilename}`, {
                        method: 'PUT',
                        headers: headers,
                        body: JSON.stringify(requestBody)
                    });

                    if (fileResponse.ok) {
                        console.log(`Successfully ${operation.type}d: ${operation.filename}`);
                        const responseData = await fileResponse.json();
                        return { success: true, commitSha: responseData.commit?.sha };
                    } else {
                        const errorText = await fileResponse.text();
                        console.error(`Failed to ${operation.type} ${operation.filename}:`, errorText);
                        return { success: false };
                    }
                }

                return { success: false };

            } catch (error) {
                console.error(`Error executing ${operation.type} operation for ${operation.filename}:`, error);
                return { success: false };
            }
        }

        // Function to deduplicate action events based on the rules
        function deduplicateActionEvents(events, newActionEvent, newActionType, noteId) {
            const filteredEvents = [];
            let hasCreateAction = false;
            let renameAction = null;

            // First pass: identify if there's a create action or rename action for this note
            for (const event of events) {
                if (event.noteId === noteId) {
                    if (event.actionType === 'added') {
                        hasCreateAction = true;
                    } else if (event.actionType === 'renamed') {
                        renameAction = event;
                    }
                }
            }

            for (const event of events) {
                let shouldKeep = true;

                // Only consider events for the same note
                if (event.noteId === noteId) {
                    if (newActionType === 'deleted') {
                        if (hasCreateAction && event.actionType === 'added') {
                            // Rule 2: If a note has a create action and is deleted, remove the create action
                            shouldKeep = false;
                            console.log(`Deduplication: Removing create action for note ${noteId} because it was deleted`);
                        } else if (renameAction && event.actionType === 'renamed') {
                            // Rule 4: If a note is renamed and then deleted, remove the rename action
                            // and we'll create a delete action with the original filename
                            shouldKeep = false;
                            console.log(`Deduplication: Removing rename action for note ${noteId} because it was deleted`);

                            // Modify the new delete action to use the original filename
                            if (event.oldFilename) {
                                newActionEvent.noteTitle = event.noteTitle; // Use the original title from rename
                                newActionEvent.oldFilename = event.oldFilename;
                            }
                        }
                    } else if (newActionType === 'updated') {
                        if (hasCreateAction) {
                            // Rule 1: When a note has a create action, do not add any modified action types
                            // Don't add this update action at all - return early without adding
                            console.log(`Deduplication: Blocking update action for note ${noteId} because it has a create action`);
                            return events; // Return original events without adding the new action
                        } else if (event.actionType === 'updated') {
                            // Rule 2: If a note is edited multiple times, remove previous edit actions
                            shouldKeep = false;
                            console.log(`Deduplication: Removing previous edit action for note ${noteId}`);
                        }
                    } else if (newActionType === 'renamed') {
                        if (hasCreateAction) {
                            // Rule 3: When a note is renamed, do not create modification actions for it
                            // But we still allow the rename if there's a create action
                            if (event.actionType === 'updated') {
                                shouldKeep = false;
                                console.log(`Deduplication: Removing update action for note ${noteId} because it was renamed`);
                            }
                        } else if (event.actionType === 'updated') {
                            // Rule 3: If a note is renamed, remove previous edit actions
                            shouldKeep = false;
                            console.log(`Deduplication: Removing previous edit action for note ${noteId} because it was renamed`);
                        } else if (event.actionType === 'renamed') {
                            // Remove previous rename actions
                            shouldKeep = false;
                            console.log(`Deduplication: Removing previous rename action for note ${noteId}`);
                        }
                    }
                }

                if (shouldKeep) {
                    filteredEvents.push(event);
                }
            }

            return filteredEvents;
        }

        async function detectAndClearLegacySetup() {

                                }
                            }
                        } catch (e) {

                            if (key.includes('config')) {
                                hasLegacySetup = true;
                                legacyReasons.push(`Legacy config format detected in ${key}`);
                            }
                        }
                    }
                }

                // Check 2: Detect old database structure (before security improvements)
                if (db) {
                    try {
                        const transaction = db.transaction([CONFIG_STORE_NAME], 'readonly');
                        const configStore = transaction.objectStore(CONFIG_STORE_NAME);
                        const configRequest = configStore.get('security-version');

                        configRequest.onsuccess = function () {
                            if (!configRequest.result) {
                                hasLegacySetup = true;
                                legacyReasons.push('No security version marker found in database');
                            }
                        };
                    } catch (e) {
                        // If config store doesn't exist, it's definitely legacy
                        hasLegacySetup = true;
                        legacyReasons.push('Legacy database structure detected');
                    }
                }

                // Check 3: Detect missing security features
                const securityMarkers = [
                    'notez-security-initialized',
                    'notez-encryption-enabled'
                ];

                for (const marker of securityMarkers) {
                    if (!localStorage.getItem(marker)) {
                        hasLegacySetup = true;
                        legacyReasons.push(`Missing security marker: ${marker}`);
                    }
                }

                // If legacy setup detected, perform cleanup
                if (hasLegacySetup) {
                    console.log('⚠️  Legacy setup detected:', legacyReasons);
                    console.log('🧹 Clearing legacy data for security upgrade...');

                    await clearLegacyData();

                    // Set security markers to prevent future cleanup
                    localStorage.setItem('notez-security-initialized', 'true');
                    localStorage.setItem('notez-encryption-enabled', 'true');

                    // Mark security version in database
                    if (db) {
                        try {
                            const transaction = db.transaction([CONFIG_STORE_NAME], 'readwrite');
                            const configStore = transaction.objectStore(CONFIG_STORE_NAME);
                            await configStore.put({
                                key: 'security-version',
                                value: '1.0.0',
                                timestamp: Date.now()
                            });
                        } catch (e) {
                            console.error('Failed to set security version marker:', e);
                        }
                    }

                    console.log('✅ Legacy data cleared successfully');
                    console.log('ℹ️  Note: You may need to reconfigure your GitHub settings');
                } else {

                console.error('Error during legacy setup detection:', error);

            }

        /**
         * Clears all legacy data that may be incompatible with security improvements
         */
        async function clearLegacyData() {
            console.log('🧹 Clearing legacy data...');

            try {
                // Clear all potentially legacy localStorage items
                const legacyKeys = [
                    'notez-github-config',
                    'notez-github-config-full',
                    'github-config',
                    'notez-github-repository-url',
                    'notez-github-token',
                    'notez-sync-config',
                    'notez-notes', // Old notes storage
                    'notez-tags'   // Old tags storage
                ];

                for (const key of legacyKeys) {
                    if (localStorage.getItem(key)) {
                        localStorage.removeItem(key);
                        console.log(`  Removed legacy localStorage item: ${key}`);
                    }
                }

                // Clear IndexedDB completely to ensure clean slate
                if (db) {
                    const transaction = db.transaction([STORE_NAME, CONFIG_STORE_NAME], 'readwrite');
                    const notesStore = transaction.objectStore(STORE_NAME);
                    const configStore = transaction.objectStore(CONFIG_STORE_NAME);

                    await new Promise((resolve, reject) => {
                        const clearNotes = notesStore.clear();
                        const clearConfig = configStore.clear();

                        let completed = 0;
                        const onComplete = () => {
                            completed++;
                            if (completed === 2) resolve();
                        };

                        clearNotes.onsuccess = onComplete;
                        clearNotes.onerror = reject;
                        clearConfig.onsuccess = onComplete;
                        clearConfig.onerror = reject;
                    });

                    console.log('  Cleared IndexedDB stores');
                }

                // Clear any cached data
                if ('caches' in window) {
                    try {
                        const cacheNames = await caches.keys();
                        for (const name of cacheNames) {
                            await caches.delete(name);
                            console.log(`  Cleared cache: ${name}`);
                        }
                    } catch (e) {
                        console.error('Failed to clear caches:', e);
                    }
                }

                console.log('✅ Legacy data clearing completed');

            } catch (error) {
                console.error('Error clearing legacy data:', error);
                throw error;
            }
        }

                    app.ports.syncCompleted.send({ tag: 'Err', contents: 'Failed to decode GitHub configuration for force pull' });
                    return;
                }

                performForcePullFromGitHub(config)
                    .then(async result => {
                        console.log('Force pull completed successfully:', result);

                        // Clear commit cache to prevent race conditions with background checks
                        // This ensures the next background check gets fresh data from GitHub API
                        try {
                            await clearCachedCommitSha(config.repositoryUrl);
                        } catch (cacheError) {
                            console.warn('Failed to clear commit cache:', cacheError);
                        }

                        // Ensure we reload the notes after force pull completion
                        try {
                            // Wait for any ongoing transactions to complete
                            await new Promise(resolve => setTimeout(resolve, 200));

                            console.log('Loading notes after force pull completion...');
                            const notes = await loadNotesFromDB();
                            console.log(`Sending ${notes.length} notes to Elm app after force pull`);
                            app.ports.notesLoaded.send(notes);

                            // For force pull, all notes are potentially updated, so notify about all of them
                            // This ensures the editor gets refreshed if the user was editing any note
                            if (result.updatedNotes && result.updatedNotes.length > 0) {
                                console.log('📨 Notifying Elm about all notes updated during force pull');
                                for (const note of result.updatedNotes) {
                                    app.ports.noteUpdatedDuringSync.send({ noteId: note.id });
                                }
                            }

                            // Send success message after notes are reloaded
                            const syncResult = {
                                message: result.message,
                                // Only include commit SHA if it's valid (force pull typically doesn't return one)
                                commitSha: result.commitSha,
                            };
                            app.ports.syncCompleted.send({ tag: 'Ok', contents: JSON.stringify(syncResult) });

                            // Send reset action count and empty events back to Elm to update the UI
                            app.ports.actionCountLoaded.send(0);
                            app.ports.actionEventsLoaded.send([]);
                        } catch (error) {
                            console.error('Failed to reload notes after force pull:', error);
                            app.ports.syncCompleted.send({ tag: 'Err', contents: 'Force pull completed but failed to reload notes: ' + error.message });
                        }
                    })
                    .catch(error => {
                        console.error('Force pull failed:', error);

                        // Check if this is an authentication or permission error
                        if (error.message.includes('401') || error.message.includes('403') ||
                            error.message.includes('Unauthorized') || error.message.includes('Forbidden') ||

                            if (app.ports.syncFailed) {

        // Function to reset code blocks to their original state (removes highlighting)
        function resetCodeBlocks() {
            // Try different selectors to find code blocks that might be highlighted
            const selectors = [
                '.code-block code',
                'pre code',
                'code[class*="language-"]',
                'code[class*="lang-"]',
                '.markdown-content pre code',
                '.markdown-content code',
                'code.hljs'  // specifically look for highlighted blocks
            ];

            let foundCodeBlocks = [];

            for (const selector of selectors) {
                const elements = document.querySelectorAll(selector);
                if (elements.length > 0) {
                    foundCodeBlocks = foundCodeBlocks.concat(Array.from(elements));
                }
            }

            // Remove duplicates
            foundCodeBlocks = [...new Set(foundCodeBlocks)];

            console.log('Resetting', foundCodeBlocks.length, 'code blocks');

            foundCodeBlocks.forEach((block) => {
                // Check if this block has been highlighted and has preserved original data
                const originalText = block.getAttribute('data-original-text') || block.textContent || block.innerText;
                const originalClassName = block.getAttribute('data-original-class') ||
                    block.className.replace(/\bhljs\b/g, '').replace(/\bhljs-\S+/g, '').trim();

                // CRITICAL: Restore to simple text structure that Elm expects
                // This prevents the replaceData error by ensuring only text nodes exist
                block.innerHTML = ''; // Clear all child elements
                block.textContent = originalText; // Set as simple text
                block.className = originalClassName; // Restore original class

                // Remove highlight.js data attributes
                block.removeAttribute('data-highlighted');
                // Keep our original data for future resets
                // block.removeAttribute('data-original-text');
                // block.removeAttribute('data-original-class');

                console.log('Reset code block - restored to plain text:', originalText.substring(0, 30) + '...');
            });
        }

        // Function to highlight code blocks (recreates content for clean state)
        function highlightCodeBlocks() {
            // Try different selectors to find code blocks
            const selectors = [
                '.code-block code',
                'pre code',
                'code[class*="language-"]',
                'code[class*="lang-"]',
                '.markdown-content pre code',
                '.markdown-content code'
            ];

            let foundCodeBlocks = [];

            for (const selector of selectors) {
                const elements = document.querySelectorAll(selector);
                if (elements.length > 0) {
                    console.log(`Found ${elements.length} code blocks with selector: ${selector}`);
                    foundCodeBlocks = foundCodeBlocks.concat(Array.from(elements));
                }
            }

            // Remove duplicates
            foundCodeBlocks = [...new Set(foundCodeBlocks)];

            console.log('Total unique code blocks to highlight:', foundCodeBlocks.length);

            foundCodeBlocks.forEach((block, index) => {
                const originalText = block.textContent || block.innerText;
                const originalClassName = block.className.replace(/\bhljs\b/g, '').replace(/\bhljs-\S+/g, '').trim();

                console.log(`Processing code block ${index}:`, {
                    hasText: !!originalText,
                    className: originalClassName,
                    parentTag: block.parentElement?.tagName,
                    parentClass: block.parentElement?.className,
                    textPreview: originalText?.substring(0, 50) + '...'
                });

                // Highlight if we have content
                if (originalText && originalText.trim()) {
                    console.log(`Highlighting code block ${index} with language:`, originalClassName || 'auto-detect');

                    // CRITICAL: Store original text as data attribute before highlighting
                    // This preserves the original content for Elm's virtual DOM
                    block.setAttribute('data-original-text', originalText);
                    if (originalClassName) {
                        block.setAttribute('data-original-class', originalClassName);
                    }

                    // Apply highlighting - this will modify the DOM structure
                    try {
                        // Ensure clean className before highlighting
                        block.className = originalClassName || '';

                        hljs.highlightElement(block);
                        console.log(`Successfully highlighted code block ${index}`);
                    } catch (error) {
                        console.error(`Error highlighting code block ${index}:`, error);
                    }
                } else {
                    console.log(`Skipping code block ${index} - no content`);
                }
            });
        }

        // Function to render Mermaid diagrams after dynamic content changes
        function renderMermaidDiagrams() {
            // Clear all previous processing markers for re-rendering
            const allMermaidElements = document.querySelectorAll('.mermaid-diagram[data-mermaid]');
            console.log('Found', allMermaidElements.length, 'Mermaid diagrams to process');

            allMermaidElements.forEach(async (element) => {
                try {
                    const mermaidCode = element.getAttribute('data-mermaid');
                    const currentHash = element.getAttribute('data-content-hash');
                    const processedHash = element.getAttribute('data-processed-hash');

                    // Only re-render if content has actually changed
                    if (processedHash && processedHash === currentHash) {
                        console.log('Mermaid diagram unchanged, skipping re-render');
                        return;
                    }

                    console.log('Processing Mermaid diagram:', mermaidCode.substring(0, 50) + '...');

                    if (mermaidCode && mermaidCode.trim()) {
                        // Clear the element and reset classes
                        element.innerHTML = '';
                        element.classList.add('mermaid');

                        // Remove any previous processing markers to force re-rendering
                        element.removeAttribute('data-processed');

                        // Generate unique ID for this diagram
                        const diagramId = 'mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);

                        // Render the mermaid diagram
                        const { svg } = await mermaid.render(diagramId, mermaidCode);
                        element.innerHTML = svg;
                        element.setAttribute('data-processed', 'true');
                        element.setAttribute('data-processed-hash', currentHash);
                        console.log('Successfully rendered Mermaid diagram with ID:', diagramId);
                    }
                } catch (error) {
                    console.error('Mermaid rendering error:', error);
                    element.innerHTML = '<p style="color: red; font-style: italic;">Error rendering diagram: ' + error.message + '</p>';
                    element.setAttribute('data-processed', 'true');
                    const currentHash = element.getAttribute('data-content-hash');
                    element.setAttribute('data-processed-hash', currentHash);
                }
            });
        }

        // Function to clear all mermaid diagrams
        function clearMermaidDiagrams() {
            console.log('Clearing all existing mermaid diagrams...');

            // Find all elements with mermaid-related classes or data attributes
            const mermaidElements = document.querySelectorAll('.mermaid, .mermaid-diagram, [data-mermaid], [data-processed="true"]');

            mermaidElements.forEach(element => {
                // Clear the innerHTML to remove any rendered mermaid content
                if (element.classList.contains('mermaid') || element.hasAttribute('data-processed')) {
                    element.innerHTML = '';
                }

                // Remove mermaid-specific classes
                element.classList.remove('mermaid');

                // Remove processing attributes to allow fresh rendering
                element.removeAttribute('data-processed');
                element.removeAttribute('data-processed-hash');

                console.log('Cleared mermaid diagram element:', element.className || element.tagName);
            });

            // Also clear any mermaid-specific DOM artifacts that might be left behind
            // Mermaid sometimes creates additional elements in the DOM
            const mermaidSvgs = document.querySelectorAll('svg[id^="mermaid-"]');
            mermaidSvgs.forEach(svg => {
                console.log('Removing orphaned mermaid SVG:', svg.id);
                svg.remove();
            });

            console.log(`Cleared ${mermaidElements.length} mermaid elements and ${mermaidSvgs.length} orphaned SVGs`);
        }

        // Function to insert text at cursor position in the active textarea
        function insertTextAtCursor(text) {
            // Find the currently focused textarea or input, or default to note textarea
            const activeElement = document.activeElement;
            let targetElement = null;

            if (activeElement && (activeElement.tagName === 'TEXTAREA' || activeElement.tagName === 'INPUT')) {
                targetElement = activeElement;
            } else {
                // Fallback to note textarea if no textarea is focused
                targetElement = document.querySelector('.note-textarea');
            }

            if (!targetElement) {
                console.warn('No textarea found to insert text into');
                return;
            }

            const startPos = targetElement.selectionStart;
            const endPos = targetElement.selectionEnd;
            const currentValue = targetElement.value;

            // Insert the text at cursor position
            const newValue = currentValue.substring(0, startPos) + text + currentValue.substring(endPos);
            targetElement.value = newValue;

            // Set cursor position after the inserted text
            const newCursorPos = startPos + text.length;
            targetElement.setSelectionRange(newCursorPos, newCursorPos);

            // Focus the element and trigger input event so Elm gets notified
            targetElement.focus();
            targetElement.dispatchEvent(new Event('input', { bubbles: true }));

            console.log('Inserted text at cursor:', text);
        }

        // Function to process all dynamic content
        function processMarkdownContent() {
            console.log('Processing markdown content...');

            // CRITICAL: Clear all existing mermaid content first to prevent duplication
            // This is essential because Elm's virtual DOM creates new elements, 
            // but old rendered SVG content might still exist in the DOM
            clearMermaidDiagrams();

            // First, reset all code blocks to clean state
            resetCodeBlocks();

            // Debug: Check what elements actually exist in the DOM
            const allCodeElements = document.querySelectorAll('code');
            const preCodeElements = document.querySelectorAll('pre code');
            const codeBlockElements = document.querySelectorAll('.code-block code');

            console.log('DOM Debug - Found elements:');
            console.log('- All code elements:', allCodeElements.length);
            console.log('- pre > code elements:', preCodeElements.length);
            console.log('- .code-block code elements:', codeBlockElements.length);

            // Log actual structure
            allCodeElements.forEach((el, i) => {
                console.log(`Code element ${i}:`, {
                    className: el.className,
                    parentClassName: el.parentElement?.className,
                    textContent: el.textContent?.substring(0, 50) + '...'
                });
            });

            // Wait a brief moment for Elm's virtual DOM to update the content
            // then highlight code blocks with fresh content
            setTimeout(() => {
                highlightCodeBlocks();
                renderMermaidDiagrams();
            }, 15); // Reduced timeout for better responsiveness
        }

        // Debounce function to prevent excessive processing
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        const debouncedProcess = debounce(processMarkdownContent, 50); // Reduced to 50ms for better responsiveness while avoiding excessive calls

        // Set up a MutationObserver to watch for content changes
        const observer = new MutationObserver((mutations) => {
            let shouldProcess = false;
            mutations.forEach((mutation) => {
                if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                    mutation.addedNodes.forEach((node) => {
                        if (node.nodeType === 1) { // Element node
                            if (node.classList && (
                                node.classList.contains('markdown-content') ||
                                node.classList.contains('markdown-preview-container') ||
                                node.classList.contains('markdown-preview-pane') ||
                                node.classList.contains('note-content-box')
                            )) {
                                shouldProcess = true;
                            } else if (node.querySelector && (
                                node.querySelector('.code-block') ||
                                node.querySelector('.mermaid-diagram') ||
                                node.querySelector('.markdown-content')
                            )) {
                                shouldProcess = true;
                            }
                        }
                    });
                } else if (mutation.type === 'attributes' &&
                    mutation.target.classList &&
                    mutation.target.classList.contains('markdown-content')) {
                    shouldProcess = true;
                }
            });

            if (shouldProcess) {
                debouncedProcess();
            }
        });

        // Start observing when the page is loaded
        document.addEventListener('DOMContentLoaded', () => {
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });

            // Initial processing
            processMarkdownContent();
        });
    </script>
