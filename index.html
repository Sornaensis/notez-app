    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

<body>
    <div id="app"></div>
    <script src="main.js"></script>
    <script>
        // IndexedDB setup
        let db;
        const DB_NAME = 'NotezDB';
        const DB_VERSION = 2; // Incremented for GitHub config storage
        const STORE_NAME = 'notes';
        const CONFIG_STORE_NAME = 'config';

        // Initialize IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    db = event.target.result;

                    // Create notes store if it doesn't exist
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }

                    // Create config store for non-sensitive settings
                    // NOTE: GitHub tokens are now stored in the credentials store, not here
                    if (!db.objectStoreNames.contains(CONFIG_STORE_NAME)) {
                        db.createObjectStore(CONFIG_STORE_NAME, { keyPath: 'key' });
                    }
                };
            });
        }

        // Secure logging utility to prevent sensitive data exposure
        const secureLog = {
            // Sensitive data patterns to redact
            sensitivePatterns: [
                /ghp_[a-zA-Z0-9]{36}/g, // GitHub Personal Access Tokens
                /github_pat_[a-zA-Z0-9_]{82}/g, // GitHub fine-grained PATs
                /passphrase/gi, // Passphrase references
                /password/gi, // Password references
                /token/gi, // Generic token references
                /secret/gi, // Secret references
                /key/gi, // Key references
            ],
            
            // Redact sensitive information from objects and strings
            redactSensitiveData: function(data) {
                if (typeof data === 'string') {
                    let redacted = data;
                    this.sensitivePatterns.forEach(pattern => {
                        redacted = redacted.replace(pattern, '[REDACTED]');
                    });
                    return redacted;
                } else if (typeof data === 'object' && data !== null) {
                    const redacted = {};
                    for (const [key, value] of Object.entries(data)) {
                        // Redact sensitive keys
                        if (key.toLowerCase().includes('passphrase') || 
                            key.toLowerCase().includes('token') || 
                            key.toLowerCase().includes('password') || 
                            key.toLowerCase().includes('secret') ||
                            key.toLowerCase().includes('key')) {
                            
                            if (typeof value === 'string') {
                                redacted[key] = value.length > 0 ? '[REDACTED]' : value;
                            } else if (typeof value === 'number') {
                                redacted[key] = value; // Keep lengths for debugging
                            } else {
                                redacted[key] = '[REDACTED]';
                            }
                        } else {
                            redacted[key] = typeof value === 'object' ? this.redactSensitiveData(value) : value;
                        }
                    }
                    return redacted;
                }
                return data;
            },
            
            // Secure console.log replacement
            log: function(message, ...args) {
                const redactedMessage = this.redactSensitiveData(message);
                const redactedArgs = args.map(arg => this.redactSensitiveData(arg));
                console.log(redactedMessage, ...redactedArgs);
            },
            
            // Secure console.error replacement
            error: function(message, ...args) {
                const redactedMessage = this.redactSensitiveData(message);
                const redactedArgs = args.map(arg => this.redactSensitiveData(arg));
                console.error(redactedMessage, ...redactedArgs);
            },
            
            // Secure console.warn replacement
            warn: function(message, ...args) {
                const redactedMessage = this.redactSensitiveData(message);
                const redactedArgs = args.map(arg => this.redactSensitiveData(arg));
                console.warn(redactedMessage, ...redactedArgs);
            }
        };

        // Simple encryption/decryption utilities using Web Crypto API
        async function deriveKey(passphrase, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                enc.encode(passphrase),
                { name: 'PBKDF2' },
                false,
                ['deriveBits', 'deriveKey']
            );

            return crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 600000, // Increased from 100,000 to 600,000+ per OWASP 2023 recommendation
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                true,
                ['encrypt', 'decrypt']
            );
        }

        // Secure random number generation with fallback
        function secureRandomBytes(length) {
            if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
                return crypto.getRandomValues(new Uint8Array(length));
            } else if (typeof msCrypto !== 'undefined' && msCrypto.getRandomValues) {
                // Fallback for older Internet Explorer
                return msCrypto.getRandomValues(new Uint8Array(length));
            } else {
                // Fallback for environments without crypto API (should not happen in modern browsers)
                console.warn('⚠️  No cryptographically secure random number generator available. Using Math.random() fallback.');
                const bytes = new Uint8Array(length);
                for (let i = 0; i < length; i++) {
                    bytes[i] = Math.floor(Math.random() * 256);
                }
                return bytes;
            }
        }

        async function encryptText(text, passphrase) {
            const enc = new TextEncoder();
            const salt = secureRandomBytes(16);
            const iv = secureRandomBytes(12);

            const key = await deriveKey(passphrase, salt);
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                enc.encode(text)
            );

            // Combine salt, iv, and encrypted data
            const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
            combined.set(salt, 0);
            combined.set(iv, salt.length);
            combined.set(new Uint8Array(encrypted), salt.length + iv.length);

            // Convert to base64 for storage
            return btoa(String.fromCharCode.apply(null, combined));
        }

        async function decryptText(encryptedData, passphrase) {
            try {
                secureLog.log('decryptText called with:', {
                    encryptedDataType: typeof encryptedData,
                    encryptedDataLength: encryptedData ? encryptedData.length : 'undefined',
                    passphraseType: typeof passphrase,
                    passphraseLength: passphrase ? passphrase.length : 'undefined'
                });

                if (!encryptedData || typeof encryptedData !== 'string') {
                    throw new Error('Invalid encrypted data: must be a non-empty string. Received: ' + (typeof encryptedData) + ' with value: ' + encryptedData);
                }

                if (!passphrase || typeof passphrase !== 'string') {
                    throw new Error('Invalid passphrase: must be a non-empty string. Received: ' + (typeof passphrase));
                }

                // Convert from base64
                secureLog.log('Converting from base64...');
                const combined = new Uint8Array(atob(encryptedData).split('').map(char => char.charCodeAt(0)));
                secureLog.log('Combined data length:', combined.length);

                // Extract salt, iv, and encrypted data
                const salt = combined.slice(0, 16);
                const iv = combined.slice(16, 28);
                const encrypted = combined.slice(28);

                secureLog.log('Extracted components:', {
                    saltLength: salt.length,
                    ivLength: iv.length,
                    encryptedLength: encrypted.length
                });

                if (salt.length !== 16) {
                    throw new Error('Invalid salt length: expected 16, got ' + salt.length);
                }

                if (iv.length !== 12) {
                    throw new Error('Invalid IV length: expected 12, got ' + iv.length);
                }

                if (encrypted.length === 0) {
                    throw new Error('No encrypted data found');
                }

                secureLog.log('Deriving key...');
                const key = await deriveKey(passphrase, salt);
                secureLog.log('Key derived successfully');

                secureLog.log('Decrypting...');
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    encrypted
                );
                secureLog.log('Decryption successful, decrypted length:', decrypted.byteLength);

                const dec = new TextDecoder();
                const result = dec.decode(decrypted);
                secureLog.log('Text decoded successfully, result length:', result.length);
                return result;
            } catch (error) {
                secureLog.error('decryptText error:', error);

                // Provide more specific error messages based on the error type
                if (error.message.includes('Invalid encrypted data')) {
                    throw new Error('No valid encrypted token found. The GitHub token may not be properly stored.');
                } else if (error.message.includes('Invalid passphrase')) {
                    throw new Error('Passphrase is required but was not provided.');
                } else if (error.message.includes('Invalid salt length') || error.message.includes('Invalid IV length')) {
                    throw new Error('Corrupted encrypted data. The stored token appears to be damaged.');
                } else if (error.name === 'OperationError' || error.message.includes('decrypt')) {
                    throw new Error('Incorrect passphrase or corrupted data.');
                } else {
                    throw new Error('Decryption failed: ' + error.message);
                }
            }
        }

        // Transaction queue to prevent overlapping database operations
        let transactionQueue = Promise.resolve();
        
        // Enhanced transaction queue for sync operations
        // Sync operations have priority over regular operations
        let syncTransactionQueue = Promise.resolve();
        
        // Queue sync-specific database operations with higher priority
        function queueSyncOperation(operation) {
            return syncTransactionQueue = syncTransactionQueue.then(operation);
        }
        
        // Queue regular database operations
        function queueRegularOperation(operation) {
            return transactionQueue = transactionQueue.then(operation);
        }

        // Save notes to IndexedDB with encryption
        async function saveNotesToDB(notes, isSyncOperation = false) {
            // Queue this transaction to prevent overlapping operations
            // Use sync queue for sync operations, regular queue for normal operations
            const queueFunction = isSyncOperation ? queueSyncOperation : queueRegularOperation;
            return queueFunction(async () => {
                return new Promise(async (resolve, reject) => {
                    try {
                        console.log(`Starting database transaction for ${notes.length} notes`);

                        // Pre-encrypt all notes before starting the transaction
                        // This prevents async operations inside the transaction that could cause it to close
                        const encryptedNotes = [];
                        for (const note of notes) {
                            try {
                                const encryptedNote = await encryptNoteData(note);
                                encryptedNotes.push(encryptedNote);
                            } catch (error) {
                                console.error('Failed to encrypt note:', note.id, error);
                                // Fallback to unencrypted storage for this note
                                encryptedNotes.push({ ...note, isEncrypted: false });
                            }
                        }

                        console.log(`Encrypted ${encryptedNotes.length} notes, starting database transaction`);

                        // Now perform the synchronous database operations
                        const transaction = db.transaction([STORE_NAME], 'readwrite');
                        const store = transaction.objectStore(STORE_NAME);

                        // Clear existing notes
                        const clearRequest = store.clear();
                        clearRequest.onsuccess = () => {
                            console.log('Cleared existing notes, adding new notes');
                            // Add all pre-encrypted notes synchronously
                            for (const encryptedNote of encryptedNotes) {
                                store.add(encryptedNote);
                            }
                        };

                        clearRequest.onerror = () => {
                            console.error('Failed to clear existing notes:', clearRequest.error);
                            reject(createSecureError('Failed to clear existing notes', clearRequest.error));
                        };

                        transaction.oncomplete = () => {
                            console.log('Database transaction completed successfully');
                            resolve();
                        };

                        transaction.onerror = () => {
                            console.error('Database transaction failed:', transaction.error);
                            reject(createSecureError('Database transaction failed', transaction.error));
                        };
                    } catch (error) {
                        console.error('Failed to save notes:', error);
                        reject(createSecureError('Failed to save notes', error));
                    }
                });
            }).catch(error => {
                console.error('Transaction queue error:', error);
                throw error;
            });
        }

        // Load notes from IndexedDB with decryption
        async function loadNotesFromDB(isSyncOperation = false) {
            // Queue this transaction to prevent overlapping operations
            // Use sync queue for sync operations, regular queue for normal operations
            const queueFunction = isSyncOperation ? queueSyncOperation : queueRegularOperation;
            return queueFunction(async () => {
                return new Promise(async (resolve, reject) => {
                    try {
                        console.log('Starting database read transaction');
                        const transaction = db.transaction([STORE_NAME], 'readonly');
                        const store = transaction.objectStore(STORE_NAME);
                        const request = store.getAll();

                        request.onsuccess = async () => {
                            try {
                                const encryptedNotes = request.result || [];
                                console.log(`Loaded ${encryptedNotes.length} encrypted notes from database`);
                                const decryptedNotes = [];

                                for (const encryptedNote of encryptedNotes) {
                                    const decryptedNote = await decryptNoteData(encryptedNote);
                                    decryptedNotes.push(decryptedNote);
                                }

                                console.log(`Successfully decrypted ${decryptedNotes.length} notes`);
                                resolve(decryptedNotes);
                            } catch (error) {
                                // If decryption fails, return empty array (data may be corrupted)
                                console.warn('Failed to decrypt some notes, returning empty array');
                                resolve([]);
                            }
                        };
                        request.onerror = () => {
                            console.error('Database read operation failed:', request.error);
                            reject(createSecureError('Database operation failed', request.error));
                        };
                    } catch (error) {
                        console.error('Failed to load notes:', error);
                        reject(createSecureError('Failed to load notes', error));
                    }
                });
            }).catch(error => {
                console.error('Transaction queue error during load:', error);
                throw error;
            });
        }

        // Encrypt note data for storage
        async function encryptNoteData(note) {
            try {
                // Generate a key for note encryption based on a static salt
                // In a real application, this should be user-specific
                const noteKey = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('notez-note-encryption-key'));
                const keyArray = new Uint8Array(noteKey);

                // Only encrypt the content field (title and metadata can remain unencrypted for search)
                const encryptedContent = await encryptText(note.content, btoa(String.fromCharCode(...keyArray)).slice(0, 32));

                return {
                    ...note,
                    content: encryptedContent,
                    isEncrypted: true
                };
            } catch (error) {
                console.error('Failed to encrypt note data:', error);
                // Fallback to unencrypted storage
                return { ...note, isEncrypted: false };
            }
        }

        // Decrypt note data from storage
        async function decryptNoteData(encryptedNote) {
            try {
                if (!encryptedNote.isEncrypted) {
                    // Note is not encrypted, return as-is
                    return encryptedNote;
                }

                // Generate the same key used for encryption
                const noteKey = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('notez-note-encryption-key'));
                const keyArray = new Uint8Array(noteKey);

                const decryptedContent = await decryptText(encryptedNote.content, btoa(String.fromCharCode(...keyArray)).slice(0, 32));

                return {
                    ...encryptedNote,
                    content: decryptedContent,
                    isEncrypted: false
                };
            } catch (error) {
                console.error('Failed to decrypt note data:', error);
                // Return note with placeholder content if decryption fails
                return {
                    ...encryptedNote,
                    content: '[ERROR: Unable to decrypt note content]',
                    isEncrypted: false
                };
            }
        }

        // Helper function to detect if a token is encrypted
        function isTokenEncrypted(token) {
            if (!token) return false;
            // Plain GitHub tokens start with these prefixes
            return !token.startsWith('ghp_') && !token.startsWith('github_pat_');
        }

        // Security functions for input validation and sanitization
        function sanitizeHtml(input) {
            if (!input || typeof input !== 'string') return '';

            // Create a temporary div to leverage browser's HTML parsing
            const tempDiv = document.createElement('div');
            tempDiv.textContent = input;
            return tempDiv.innerHTML;
        }

        function sanitizeForMarkdown(input) {
            if (!input || typeof input !== 'string') return '';

            // Remove potential XSS vectors while preserving markdown functionality
            return input
                .replace(/<script[^>]*>.*?<\/script>/gi, '') // Remove script tags
                .replace(/<iframe[^>]*>.*?<\/iframe>/gi, '') // Remove iframe tags
                .replace(/<object[^>]*>.*?<\/object>/gi, '') // Remove object tags
                .replace(/<embed[^>]*>/gi, '') // Remove embed tags
                .replace(/javascript:/gi, '') // Remove javascript: protocol
                .replace(/vbscript:/gi, '') // Remove vbscript: protocol
                .replace(/data:(?!image\/(?:png|jpe?g|gif|svg|webp);base64,)/gi, '') // Remove data: protocol except for images
                .replace(/on\w+\s*=/gi, ''); // Remove event handlers
        }

        function normalizeGitHubRepositoryUrl(url) {
            if (!url || typeof url !== 'string') return '';

            let normalized = url.trim();

            // Convert http to https for security
            if (normalized.startsWith('http://github.com/')) {
                normalized = normalized.replace('http://github.com/', 'https://github.com/');
            }

            // Remove trailing slash for consistency
            if (normalized.endsWith('/')) {
                normalized = normalized.slice(0, -1);
            }

            return normalized;
        }

        function validateGitHubRepositoryUrl(url) {
            if (!url || typeof url !== 'string') return false;

            // First normalize the URL
            const normalizedUrl = normalizeGitHubRepositoryUrl(url);

            // Strict validation for GitHub repository URLs
            const githubRepoRegex = /^https:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/?$/;
            return githubRepoRegex.test(normalizedUrl);
        }

        function validateGitHubToken(token) {
            if (!token || typeof token !== 'string') return false;

            // Validate GitHub token format (either encrypted or valid GitHub token format)
            if (isTokenEncrypted(token)) {
                // For encrypted tokens, check if it looks like encrypted data (base64-like)
                const base64Regex = /^[A-Za-z0-9+/=]{40,}$/;
                return base64Regex.test(token);
            }

            // Check for valid GitHub token patterns
            const githubTokenRegex = /^(ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82})$/;
            return githubTokenRegex.test(token);
        }

        // Rate limiting implementation
        const rateLimiters = new Map();

        function checkRateLimit(key, maxRequests = 5, windowMs = 60000) {
            const now = Date.now();
            const limiter = rateLimiters.get(key) || { count: 0, resetTime: now + windowMs };

            // Reset if window has expired
            if (now > limiter.resetTime) {
                limiter.count = 0;
                limiter.resetTime = now + windowMs;
            }

            if (limiter.count >= maxRequests) {
                return false; // Rate limit exceeded
            }

            limiter.count++;
            rateLimiters.set(key, limiter);
            return true;
        }

        // Secure error handling without information disclosure
        function createSecureError(message, details = null) {
            const error = new Error(message);

            // Log detailed error for debugging (only in development)
            if (details && console && console.error) {
                secureLog.error('Detailed error information:', details);
            }

            return error;
        }

        // Validate that no sensitive data is being stored in localStorage
        function validateStorageData(key, data) {
            // Only validate if it's a string that might contain sensitive data
            if (typeof data === 'string') {
                // Check for unencrypted GitHub tokens
                if (data.includes('ghp_') || data.includes('github_pat_')) {
                    throw createSecureError(`Attempted to store unencrypted GitHub token in localStorage key: ${key}`);
                }
                
                // Check for other potentially sensitive patterns
                const sensitivePatterns = [
                    /password["\s]*[:=]["\s]*[^"]+/i,
                    /passphrase["\s]*[:=]["\s]*[^"]+/i,
                    /secret["\s]*[:=]["\s]*[^"]+/i,
                ];
                
                for (const pattern of sensitivePatterns) {
                    if (pattern.test(data)) {
                        secureLog.warn(`Potentially sensitive data detected in localStorage key: ${key}`);
                        break;
                    }
                }
            }
        }

        // Secure wrapper for localStorage.setItem
        function secureLocalStorageSetItem(key, value) {
            try {
                validateStorageData(key, value);
                localStorage.setItem(key, value);
            } catch (error) {
                secureLog.error('Failed to validate storage data:', error);
                throw error;
            }
        }

        // Save GitHub configuration to credentials store
        // Save GitHub configuration to localStorage (token is now encrypted)
        async function saveGitHubConfigToCredentials(config) {
            try {
                // Input validation
                if (!config || typeof config !== 'object') {
                    throw createSecureError('Invalid configuration object', { configType: typeof config });
                }

                // Normalize repository URL if provided
                if (config.repositoryUrl) {
                    config.repositoryUrl = normalizeGitHubRepositoryUrl(config.repositoryUrl);
                }

                // Validate repository URL if provided
                if (config.repositoryUrl && !validateGitHubRepositoryUrl(config.repositoryUrl)) {
                    throw createSecureError('Invalid GitHub repository URL format');
                }

                // Validate token if provided
                if (config.personalAccessToken && !validateGitHubToken(config.personalAccessToken)) {
                    throw createSecureError('Invalid GitHub token format');
                }

                // Security check: ensure the token is encrypted (not a plain GitHub token)
                if (config.personalAccessToken && !isTokenEncrypted(config.personalAccessToken)) {
                    secureLog.error('⚠️ SECURITY WARNING: Attempting to save unencrypted GitHub token!');
                    secureLog.error('Token starts with:', config.personalAccessToken.substring(0, 10) + '...');
                    console.trace('Stack trace for unencrypted token save attempt:');
                    throw createSecureError('Cannot save unencrypted GitHub token to storage');
                }

                // Store the entire config in localStorage since the token is now encrypted
                secureLocalStorageSetItem('notez-github-config', JSON.stringify(config));
                secureLog.log('✅ GitHub config saved to localStorage successfully (token encrypted)');

                // Debug: Check what we actually saved
                const savedConfig = JSON.parse(localStorage.getItem('notez-github-config'));
                console.log('📝 Saved config verification:', {
                    repositoryUrl: savedConfig.repositoryUrl || '[NOT SET]',
                    hasToken: !!(savedConfig.personalAccessToken),
                    tokenLength: savedConfig.personalAccessToken?.length || 0,
                    tokenIsEncrypted: isTokenEncrypted(savedConfig.personalAccessToken),
                    enabled: savedConfig.enabled,
                    lastSyncTime: savedConfig.lastSyncTime,
                    lastSyncRef: savedConfig.lastSyncRef || '[NOT SET]'
                });
            } catch (error) {
                console.error('Failed to save GitHub config to localStorage:', error);
                throw error;
            }
        }

        // Load GitHub configuration from localStorage (token is now encrypted)  
        async function loadGitHubConfigFromCredentials() {
            try {
                const configJson = localStorage.getItem('notez-github-config');
                if (configJson) {
                    const config = JSON.parse(configJson);
                    console.log('✅ GitHub config loaded from localStorage successfully');
                    console.log('📝 Loaded config verification:', {
                        repositoryUrl: config.repositoryUrl || '[NOT SET]',
                        hasToken: !!(config.personalAccessToken),
                        tokenLength: config.personalAccessToken?.length || 0,
                        tokenIsEncrypted: isTokenEncrypted(config.personalAccessToken),
                        enabled: config.enabled,
                        lastSyncTime: config.lastSyncTime,
                        lastSyncRef: config.lastSyncRef || '[NOT SET]'
                    });
                    return config;
                } else {
                    console.log('No GitHub config found in localStorage');
                    return null;
                }
            } catch (error) {
                console.error('Failed to load GitHub config from localStorage:', error);
                return null;
            }
        }

        // Fallback functions for localStorage (when Credentials API is not available)
        function saveGitHubConfigToLocalStorage(config) {
            try {
                // Same security check as the main function
                if (config.personalAccessToken && !isTokenEncrypted(config.personalAccessToken)) {
                    secureLog.error('⚠️ SECURITY WARNING: Attempting to save unencrypted GitHub token to localStorage fallback!');
                    secureLog.error('Token starts with:', config.personalAccessToken.substring(0, 10) + '...');
                    console.trace('Stack trace for unencrypted token save attempt:');
                    throw new Error('Cannot save unencrypted GitHub token to storage');
                }

                secureLocalStorageSetItem('notez-github-config-full', JSON.stringify(config));
                secureLog.log('✅ GitHub configuration saved to localStorage (fallback) - token encrypted');
            } catch (error) {
                console.error('Error saving GitHub config to localStorage:', error);
                throw error;
            }
        }

        function loadGitHubConfigFromLocalStorage() {
            try {
                const configStr = localStorage.getItem('notez-github-config-full');
                if (configStr) {
                    const config = JSON.parse(configStr);
                    console.log('✅ GitHub config loaded from localStorage fallback:', {
                        repositoryUrl: config.repositoryUrl || '[NOT SET]',
                        hasToken: !!(config.personalAccessToken),

        // Commit SHA caching for performance optimization with integrity checks
        const COMMIT_CACHE_KEY = 'notez-commit-cache';
        const CACHE_DURATION = 5 * 60 * 1000; // 5 minutes

        // Generate integrity hash for cache entry
        async function generateCacheHash(data) {
            const encoder = new TextEncoder();
            const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(JSON.stringify(data)));
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Verify cache entry integrity
        async function verifyCacheIntegrity(entry) {
            try {
                const dataToHash = { sha: entry.sha, timestamp: entry.timestamp };
                const expectedHash = await generateCacheHash(dataToHash);
                return entry.integrity === expectedHash;
            } catch (error) {
                console.error('Error verifying cache integrity:', error);
                return false;
            }
        }

        async function getCachedCommitSha(repoUrl) {
            try {
                const cache = JSON.parse(localStorage.getItem(COMMIT_CACHE_KEY) || '{}');
                const entry = cache[repoUrl];

                if (entry && Date.now() - entry.timestamp < CACHE_DURATION) {
                    // Verify cache integrity
                    if (entry.integrity && await verifyCacheIntegrity(entry)) {
                        return entry.sha;
                    } else {
                        console.warn('Cache integrity check failed, removing corrupted entry');
                        delete cache[repoUrl];
                        localStorage.setItem(COMMIT_CACHE_KEY, JSON.stringify(cache));
                    }
                }
            } catch (error) {
                console.error('Error reading commit cache:', error);
            }
            return null;
        }

        async function setCachedCommitSha(repoUrl, sha) {
            try {
                const cache = JSON.parse(localStorage.getItem(COMMIT_CACHE_KEY) || '{}');
                const timestamp = Date.now();
                const dataToHash = { sha, timestamp };
                const integrity = await generateCacheHash(dataToHash);

                cache[repoUrl] = { sha, timestamp, integrity };
                localStorage.setItem(COMMIT_CACHE_KEY, JSON.stringify(cache));
            } catch (error) {
                console.error('Error writing commit cache:', error);
            }
        }

        // Clear commit cache for a specific repository to force fresh API calls
        async function clearCachedCommitSha(repoUrl) {
            try {
                const cache = JSON.parse(localStorage.getItem(COMMIT_CACHE_KEY) || '{}');
                if (cache[repoUrl]) {
                    delete cache[repoUrl];
                    localStorage.setItem(COMMIT_CACHE_KEY, JSON.stringify(cache));
                    console.log(`🗑️  Cleared commit cache for ${repoUrl}`);
                }
            } catch (error) {
                console.error('Error clearing commit cache:', error);
            }
        }

        async function migrateGitHubConfigToCredentials() {

                if (existingConfig && existingConfig.personalAccessToken) {
                    console.log('GitHub credentials already exist in credentials store, skipping migration');

                    try {

                            return;
                        }

                        const transaction = db.transaction([CONFIG_STORE_NAME], 'readonly');
                        const store = transaction.objectStore(CONFIG_STORE_NAME);
                        const request = store.get('github');

                        request.onsuccess = () => {
                            const result = request.result;
                            resolve(result && result.value ? result.value : null);
                        };
                        request.onerror = () => resolve(null);
                    } catch (error) {
                        console.warn('Error accessing IndexedDB during migration:', error);

                    }

        // Function to get the latest commit SHA from a repository branch
        async function getLatestCommitSha(repositoryUrl, token, branch = 'main', forceRefresh = false) {
            try {
                // Apply rate limiting
                const rateLimitKey = `github-api-${repositoryUrl}`;
                if (!checkRateLimit(rateLimitKey, 30, 60000)) { // 30 requests per minute per repository
                    throw createSecureError('Rate limit exceeded. Please wait before making more requests.');
                }

                // Only use cache if not forcing refresh and for non-critical operations
                if (!forceRefresh) {
                    const cachedSha = await getCachedCommitSha(repositoryUrl);
                    if (cachedSha) {
                        console.log(`Using cached commit SHA for ${repositoryUrl}: ${cachedSha}`);
                        return cachedSha;
                    }
                }

                console.log(`Fetching latest commit SHA from GitHub API for ${repositoryUrl}`);
                const url = new URL(repositoryUrl);
                const pathParts = url.pathname.split('/').filter(part => part.length > 0);

                if (pathParts.length < 2) {
                    throw createSecureError('Invalid repository URL format');
                }

                const owner = pathParts[0];
                const repo = pathParts[1];
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}`;

                const headers = {
                    'Authorization': getAuthorizationHeader(token),
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28'
                };

                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: headers
                });

                if (!response.ok) {
                    throw createSecureError(`Failed to get repository information: ${response.status}`, {
                        status: response.status,
                        statusText: response.statusText,
                        url: apiUrl
                    });
                }

                const refData = await response.json();
                const sha = refData.object.sha;

                // Always cache the fresh result
                await setCachedCommitSha(repositoryUrl, sha);
                console.log(`✓ Latest commit SHA: ${sha}`);

                return sha;

            } catch (error) {
                console.error('Error getting latest commit SHA:', error);
                throw error;
            }
        }

        // Function to compare two commits and get changed files
        async function compareCommits(repositoryUrl, token, baseCommit, headCommit) {
            try {
                const url = new URL(repositoryUrl);
                const pathParts = url.pathname.split('/').filter(part => part.length > 0);
                const owner = pathParts[0];
                const repo = pathParts[1];
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/compare/${baseCommit}...${headCommit}`;

                const headers = {
                    'Authorization': getAuthorizationHeader(token),
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28'
                };

                const response = await fetch(apiUrl, { method: 'GET', headers: headers });
                if (!response.ok) {
                    throw new Error(`Failed to compare commits: ${response.status} ${response.statusText}`);
                }

                return await response.json();
            } catch (error) {
                console.error('Error comparing commits:', error);
                throw error;
            }
        }

        // Simple GitHub API client (basic implementation)

                if (config.personalAccessToken && isTokenEncrypted(config.personalAccessToken)) {

                let addedFromRemote = 0;
